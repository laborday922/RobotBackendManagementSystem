spring:
  config:
    activate:
      on-profile: test

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ry-vue-test?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true

  sql:
    init:
      mode: never

mybatis:
  # 只扫描 function 模块的 mapper XML
  mapper-locations: classpath*:mapper/function/**/*.xml,classpath*:mapper/**/SysMapMapper.xml,classpath*:mapper/**/SysPointMapper.xml,classpath*:mapper/**/SysNavConfigMapper.xml,classpath*:mapper/**/SysReceptionConfigMapper.xml,classpath*:mapper/**/SysTour*.xml
  type-aliases-package: com.ruoyi.function.domain
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true

logging:
  level:
    com.ruoyi.function: DEBUG
    org.springframework.jdbc: DEBUG